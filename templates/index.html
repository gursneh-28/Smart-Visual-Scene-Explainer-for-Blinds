<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vision — Premium Visual Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --bg: #05070a;
            --card: #0d1117;
            --accent: #3d8ef8;
            --text: #f0f4f8;
            --dim: #8b9bb4;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Modern Premium UI ── */
        .glass {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
        }

        header {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #3d8ef8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #videoContainer {
            width: 92%;
            max-width: 550px;
            aspect-ratio: 4/3;
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            opacity: 0;
            z-index: 10;
        }
        .scanning .scan-line {
            animation: scan 2s linear infinite;
            opacity: 1;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* ── Main Interaction Card ── */
        #interactionCard {
            width: 92%;
            max-width: 550px;
            margin-top: -30px;
            z-index: 20;
            padding: 24px;
            min-height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #statusLabel {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #statusLabel span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        #mainText {
            font-size: 18px;
            line-height: 1.5;
            font-weight: 400;
            color: var(--text);
        }

        /* ── Mic & Commands ── */
        #voiceIndicator {
            margin-top: 15px;
            font-size: 14px;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pulse-ring {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid var(--accent);
            animation: ring-pulse 1.5s infinite;
        }
        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        #stopButton {
            position: fixed;
            bottom: 40px;
            padding: 18px 40px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.4);
            display: none;
            z-index: 100;
            cursor: pointer;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>VISION</h1>
        <div id="connectionStatus" style="font-size: 10px; color: #4caf50;">● Connected</div>
    </header>

    <div id="videoContainer">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-line"></div>
    </div>

    <div id="interactionCard" class="glass">
        <div id="statusLabel"><span></span> <span id="statusType">Ready</span></div>
        <div id="mainText">I'm watching. Say "Describe" or just wait for me to see something.</div>
        
        <div id="voiceIndicator">
            <div class="pulse-ring"></div>
            <span id="interimText">Listening...</span>
        </div>
    </div>

    <button id="stopButton" onclick="stopAll()">STOP SPEAKING</button>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const mainText = document.getElementById('mainText');
        const statusType = document.getElementById('statusType');
        const interimText = document.getElementById('interimText');
        const stopButton = document.getElementById('stopButton');
        const videoContainer = document.getElementById('videoContainer');

        let isAnalyzing = false;
        let currentSpeech = null;
        let lastSceneHash = "";
        let analysisId = 0;
        let speechRate = 0.9; // Slightly slower for better clarity
        let autoScanTimer = null;

        // ── Camera Setup ──
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(stream => {
            video.srcObject = stream;
            startVoiceRecognition();
            startAutoScan();
        });

        function updateStatus(type, text) {
            statusType.textContent = type;
            if (text) mainText.textContent = text;
            if (type === 'Analyzing') videoContainer.classList.add('scanning');
            else videoContainer.classList.remove('scanning');
        }

        // ── Scene Analysis ──
        async function analyzeScene(target = null) {
            const thisId = ++analysisId;
            isAnalyzing = true;
            updateStatus('Analyzing');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob, 'frame.jpg');
                if (target) formData.append('find', target);

                try {
                    const response = await fetch('/analyze', {
                        method: 'POST',
                        body: formData,
                        headers: { 'ngrok-skip-browser-warning': 'true' }
                    });
                    const data = await response.json();

                    // If a newer analysis has already started, ignore this old result
                    if (thisId !== analysisId) return;

                    isAnalyzing = false;
                    updateStatus('Ready');
                    speak(data.description);
                } catch (err) {
                    isAnalyzing = false;
                    updateStatus('Error', 'Connection trouble.');
                }
            }, 'image/jpeg', 0.8);
        }

        // ── Natural Speech ──
        function speak(text) {
            window.speechSynthesis.cancel();
            stopButton.style.display = 'block';
            updateStatus('Speaking', text);

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = speechRate;
            utterance.onend = () => {
                stopButton.style.display = 'none';
                updateStatus('Ready');
            };
            window.speechSynthesis.speak(utterance);
        }

        function stopAll() {
            window.speechSynthesis.cancel();
            stopButton.style.display = 'none';
            updateStatus('Ready', 'Speech stopped.');
        }

        // ── Intelligent Auto Scan ──
        // Only scans if the scene has changed and the camera is relatively still
        function startAutoScan() {
            if (autoScanTimer) clearInterval(autoScanTimer);
            autoScanTimer = setInterval(() => {
                if (isAnalyzing || window.speechSynthesis.speaking) return;
                
                // Simplified scene change detection
                const currentHash = getTinyHash();
                if (currentHash !== lastSceneHash) {
                    lastSceneHash = currentHash;
                    analyzeScene();
                }
            }, 12000); // 12 seconds check
        }

        function getTinyHash() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 10; tempCanvas.height = 10;
            tempCanvas.getContext('2d').drawImage(video, 0, 0, 10, 10);
            return tempCanvas.toDataURL();
        }

        // ── Voice Commands (Continuous & Fast) ──
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                const result = event.results[event.results.length - 1];
                const command = result[0].transcript.toLowerCase();
                interimText.textContent = `"${command}"`;

                if (result.isFinal) {
                    if (command.includes('stop') || command.includes('shut up') || command.includes('quiet')) {
                        stopAll();
                    } else if (command.includes('describe') || command.includes('what') || command.includes('see')) {
                        stopAll();
                        analyzeScene();
                    } else if (command.includes('read') || command.includes('text')) {
                        stopAll();
                        analyzeScene('text_only');
                    } else if (command.includes('where is') || command.includes('find')) {
                        const target = command.replace('where is', '').replace('find', '').trim();
                        stopAll();
                        analyzeScene(target);
                    }
                }
            };

            recognition.onend = () => recognition.start();
            recognition.start();
        }
    </script>
</body>
</html>
